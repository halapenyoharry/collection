<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Physics Image Browser</title>
    <script src="../_vendor/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #container {
            width: 100vw;
            min-height: 100vh;
            position: relative;
        }

        #drop-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 200px;
            border: 3px dashed rgba(255,255,255,0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 10;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.3);
        }

        #drop-zone.dragover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        #drop-zone.hidden {
            display: none;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg:active {
            cursor: grabbing;
        }

        .image-node {
            cursor: move;
        }

        .image-node:hover .image-square {
            stroke: rgba(0, 255, 136, 0.6);
            stroke-width: 2;
            filter: brightness(1.1);
        }

        .image-node.dragging .image-square {
            stroke: rgba(255, 215, 0, 0.8);
            stroke-width: 3;
            filter: brightness(1.2) drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        .resize-handle {
            fill: rgba(255, 255, 255, 0.8);
            stroke: rgba(0, 0, 0, 0.5);
            stroke-width: 1;
            cursor: nw-resize;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .image-node:hover .resize-handle {
            opacity: 1;
        }

        .resize-handle:hover {
            fill: rgba(0, 255, 136, 0.9);
            stroke: rgba(0, 0, 0, 0.8);
        }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #image-count {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.5);
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="drop-zone">
            Drop images for infinite physics canvas<br>
            <small>Scroll up ↑ and down ↓ to explore ⬜</small>
        </div>
        
        <div id="controls">
            <div id="image-count">0 squares</div>
            <button onclick="resetPositions()">Reset</button>
            <button onclick="clearImages()">Clear</button>
        </div>

        <input type="file" id="file-input" multiple accept="image/*" webkitdirectory>
        <input type="file" id="image-input" multiple accept="image/*">
        
        <svg id="physics-canvas"></svg>
    </div>

    <script>
        // Perfect circle physics with vertical flow
        let width = window.innerWidth;
        let height = window.innerHeight;
        let canvasHeight = height; // Will expand as needed
        let images = [];
        let simulation;
        let draggedNode = null;
        let resizeMode = false;
        let resizingNode = null;
        
        const svg = d3.select('#physics-canvas');
        const container = svg.append('g');
        
        // Handle window resize
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            svg.attr('width', width);
            
            // Recalculate canvas height based on content
            updateCanvasHeight();
            
            if (simulation) {
                simulation.force('boundary', boundaryForce());
                simulation.alpha(0.1).restart();
            }
        });

        // Update canvas height - simple approach, only expand down
        function updateCanvasHeight() {
            if (images.length === 0) {
                canvasHeight = height;
                svg.attr('height', canvasHeight);
                return;
            }
            
            // Only track bottom expansion, keep top at 0
            const maxY = d3.max(images, d => d.y + d.size / 2) || height;
            canvasHeight = Math.max(height, maxY + 100);
            svg.attr('height', canvasHeight);
        }

        // Boundary force - strong top boundary, infinite bottom, no side cutoffs
        function boundaryForce() {
            return function(alpha) {
                images.forEach(d => {
                    const padding = 5;
                    const radius = d.size / 2;
                    
                    // Strong horizontal boundaries - prevent cutoffs
                    if (d.x - radius < padding) {
                        d.x = padding + radius;
                        d.vx = Math.abs(d.vx) * 0.3;
                    }
                    if (d.x + radius > width - padding) {
                        d.x = width - padding - radius;
                        d.vx = -Math.abs(d.vx) * 0.3;
                    }
                    
                    // Strong top boundary - images can't go above viewport
                    if (d.y - radius < 20) {
                        d.y = 20 + radius; // Hard set position
                        d.vy = Math.abs(d.vy) * 0.5; // Bounce down
                    }
                    
                    // Update canvas height for downward expansion
                    if (d.y + radius > canvasHeight - 50) {
                        updateCanvasHeight();
                    }
                });
            };
        }

        // Perfect collision force - exactly like the circles, no jiggling
        function perfectCollisionForce() {
            return d3.forceCollide()
                .radius(d => d.size / 2 + 1)
                .strength(0.8) // Slightly less aggressive
                .iterations(2); // Fewer iterations = less jiggling
        }

        // Smart size calculation - fit in viewport if possible, allow overflow if needed
        function calculateOptimalSize(imageCount) {
            // Try to fit in initial viewport first
            const viewportArea = width * height * 0.85;
            const areaPerImage = viewportArea / imageCount;
            let sideLength = Math.sqrt(areaPerImage);
            
            // Size constraints - be more generous with space
            let optimalSize;
            if (imageCount <= 15) optimalSize = Math.min(250, sideLength);
            else if (imageCount <= 50) optimalSize = Math.min(180, sideLength);
            else if (imageCount <= 150) optimalSize = Math.min(140, sideLength);
            else if (imageCount <= 400) optimalSize = Math.min(110, sideLength);
            else if (imageCount <= 800) optimalSize = Math.min(90, sideLength);
            else if (imageCount <= 1500) optimalSize = Math.min(70, sideLength);
            else optimalSize = Math.min(55, sideLength);
            
            return Math.max(35, optimalSize); // Never smaller than 35px
        }

        // Generate square-masked thumbnail
        function generateSquareThumbnail(img, size) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = size;
            canvas.height = size;
            
            // High quality scaling
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            // Calculate crop dimensions to center the image as a square
            const sourceSize = Math.min(img.naturalWidth, img.naturalHeight);
            const sourceX = (img.naturalWidth - sourceSize) / 2;
            const sourceY = (img.naturalHeight - sourceSize) / 2;
            
            // Draw square crop
            ctx.drawImage(img, sourceX, sourceY, sourceSize, sourceSize, 0, 0, size, size);
            
            return canvas.toDataURL('image/jpeg', 0.90);
        }

        // Load images with square masking
        async function loadImages(files) {
            document.getElementById('drop-zone').classList.add('hidden');
            
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            const optimalSize = calculateOptimalSize(imageFiles.length);
            
            console.log(`Creating ${imageFiles.length} squares at ${optimalSize}px each`);
            
            images = [];
            let loadedCount = 0;
            
            // Progress indicator
            const progressDiv = document.createElement('div');
            progressDiv.style.cssText = `
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.9); color: white; padding: 20px; border-radius: 8px;
                font-size: 16px; z-index: 1000; text-align: center;
                border: 2px solid rgba(0, 255, 136, 0.5);
            `;
            document.body.appendChild(progressDiv);
            
            for (let index = 0; index < imageFiles.length; index++) {
                const file = imageFiles[index];
                
                try {
                    const img = new Image();
                    const url = URL.createObjectURL(file);
                    
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    
                    // Generate square thumbnail
                    const thumbnailURL = generateSquareThumbnail(img, optimalSize);
                    URL.revokeObjectURL(url);
                    
                    // Smart starting positions - fill from top down
                    const rowHeight = optimalSize + 10;
                    const imagesPerRow = Math.floor(width / (optimalSize + 10));
                    const row = Math.floor(index / imagesPerRow);
                    const col = index % imagesPerRow;
                    
                    const startX = (col + 0.5) * (width / imagesPerRow);
                    const startY = (row + 0.5) * rowHeight + 50;
                    
                    images.push({
                        id: index,
                        thumbnailURL: thumbnailURL,
                        size: optimalSize,
                        x: startX + (Math.random() - 0.5) * 20, // Small random offset
                        y: startY + (Math.random() - 0.5) * 20,
                        originalFile: file,
                        fullSizeURL: null
                    });
                    
                } catch (error) {
                    console.log(`Failed to process ${file.name}:`, error);
                }
                
                loadedCount++;
                progressDiv.textContent = `Processing squares: ${loadedCount}/${imageFiles.length}`;
            }
            
            document.body.removeChild(progressDiv);
            document.getElementById('image-count').textContent = `${images.length} squares`;
            
            renderSquares();
            updateCanvasHeight(); // Set proper canvas height before physics
            initSimulation();
        }

        // Gentle space-filling force - works in infinite vertical space
        function spaceFillingForce() {
            return function(alpha) {
                images.forEach(d => {
                    // Very gentle compaction toward other images - no forced direction
                    const nearbyImages = images.filter(other => 
                        other !== d && 
                        Math.sqrt((other.x - d.x) ** 2 + (other.y - d.y) ** 2) < d.size * 3
                    );
                    
                    if (nearbyImages.length > 0) {
                        const avgX = d3.mean(nearbyImages, other => other.x);
                        const avgY = d3.mean(nearbyImages, other => other.y);
                        
                        // Very gentle pull toward nearby images
                        if (avgX !== undefined) d.vx += (avgX - d.x) * alpha * 0.001;
                        if (avgY !== undefined) d.vy += (avgY - d.y) * alpha * 0.001;
                    }
                });
            };
        }

        // Initialize perfect physics simulation - stable like circles
        function initSimulation() {
            simulation = d3.forceSimulation(images)
                .force('collide', perfectCollisionForce())
                .force('boundary', boundaryForce())
                .force('topFill', spaceFillingForce()) // Gentle gap-filling only
                .velocityDecay(0.6) // More damping = less jiggling
                .alphaDecay(0.02) // Slower cooldown for smoother settling
                // No center force, no charge - pure collision physics like circles
                .on('tick', ticked)
                .on('end', () => {
                    // Update canvas height when simulation ends
                    updateCanvasHeight();
                });
        }

        // Update positions
        function ticked() {
            container.selectAll('g.image-node')
                .attr('transform', d => `translate(${d.x},${d.y})`);
        }

        // Render square images with resize handles
        function renderSquares() {
            const nodes = container.selectAll('g.image-node')
                .data(images, d => d.id);
            
            const nodeEnter = nodes.enter()
                .append('g')
                .attr('class', 'image-node')
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded));
            
            // Add clipped image
            nodeEnter.append('defs')
                .append('clipPath')
                .attr('id', d => `clip-${d.id}`)
                .append('rect')
                .attr('x', d => -d.size / 2)
                .attr('y', d => -d.size / 2)
                .attr('width', d => d.size)
                .attr('height', d => d.size)
                .attr('rx', 4);
            
            const imageGroup = nodeEnter.append('g')
                .attr('class', 'image-container');
            
            // Background square with border
            imageGroup.append('rect')
                .attr('class', 'image-square')
                .attr('x', d => -d.size / 2)
                .attr('y', d => -d.size / 2)
                .attr('width', d => d.size)
                .attr('height', d => d.size)
                .attr('rx', 4)
                .attr('fill', 'transparent')
                .attr('stroke', 'rgba(255,255,255,0.2)')
                .attr('stroke-width', 1);
            
            // Square-cropped image
            imageGroup.append('image')
                .attr('href', d => d.thumbnailURL)
                .attr('x', d => -d.size / 2)
                .attr('y', d => -d.size / 2)
                .attr('width', d => d.size)
                .attr('height', d => d.size)
                .attr('clip-path', d => `url(#clip-${d.id})`)
                .style('cursor', 'pointer')
                .on('click', showDetailView);
            
            // Resize handles in corners
            const handlePositions = [
                {x: 1, y: -1, cursor: 'ne-resize'},
                {x: 1, y: 1, cursor: 'se-resize'},
                {x: -1, y: 1, cursor: 'sw-resize'},
                {x: -1, y: -1, cursor: 'nw-resize'}
            ];
            
            handlePositions.forEach((pos, i) => {
                imageGroup.append('circle')
                    .attr('class', 'resize-handle')
                    .attr('cx', d => pos.x * d.size / 2)
                    .attr('cy', d => pos.y * d.size / 2)
                    .attr('r', 6)
                    .style('cursor', pos.cursor)
                    .call(d3.drag()
                        .on('start', (event, d) => resizeStarted(event, d, pos))
                        .on('drag', (event, d) => resizeDragged(event, d, pos))
                        .on('end', resizeEnded));
            });
            
            nodes.exit().remove();
        }

        // Show full-size detail view
        async function showDetailView(event, d) {
            event.stopPropagation();
            
            if (!d.fullSizeURL) {
                d.fullSizeURL = URL.createObjectURL(d.originalFile);
            }
            
            const modal = d3.select('body').append('div')
                .style('position', 'fixed')
                .style('top', '0')
                .style('left', '0')
                .style('width', '100%')
                .style('height', '100%')
                .style('background', 'rgba(0,0,0,0.95)')
                .style('z-index', '2000')
                .style('display', 'flex')
                .style('align-items', 'center')
                .style('justify-content', 'center')
                .style('cursor', 'pointer')
                .on('click', function() { modal.remove(); });
            
            modal.append('img')
                .attr('src', d.fullSizeURL)
                .style('max-width', '90%')
                .style('max-height', '90%')
                .style('border-radius', '8px')
                .style('box-shadow', '0 0 50px rgba(0, 255, 136, 0.3)');
            
            modal.append('div')
                .style('position', 'absolute')
                .style('bottom', '30px')
                .style('color', 'white')
                .style('font-size', '16px')
                .style('background', 'rgba(0,0,0,0.8)')
                .style('padding', '12px 20px')
                .style('border-radius', '8px')
                .text(d.originalFile.name);
        }

        // Perfect drag behavior - stable and smooth like circles
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.1).restart(); // Lower alpha = less jiggling
            draggedNode = d;
            d.fx = d.x;
            d.fy = d.y;
            
            d3.select(this).classed('dragging', true);
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
            
            // Update canvas dimensions if dragging to new areas
            updateCanvasHeight();
        }

        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            draggedNode = null;
            d.fx = null;
            d.fy = null;
            
            d3.select(this).classed('dragging', false);
            
            // Final canvas height update
            setTimeout(() => updateCanvasHeight(), 500);
        }

        // Resize functionality
        function resizeStarted(event, d, handle) {
            event.sourceEvent.stopPropagation();
            resizeMode = true;
            resizingNode = d;
            d.fx = d.x;
            d.fy = d.y;
        }

        function resizeDragged(event, d, handle) {
            const dx = event.x - d.x;
            const dy = event.y - d.y;
            
            // Calculate new size based on drag distance
            const distance = Math.sqrt(dx * dx + dy * dy);
            const newSize = Math.max(25, Math.min(400, distance * 2));
            
            if (newSize !== d.size) {
                const oldSize = d.size;
                d.size = newSize;
                
                // Generate new thumbnail at the new size
                if (d.originalFile) {
                    const img = new Image();
                    img.onload = function() {
                        const newThumbnailURL = generateSquareThumbnail(img, newSize);
                        
                        // Update the image URL
                        const node = container.selectAll('g.image-node').filter(nd => nd.id === d.id);
                        node.select('image').attr('href', newThumbnailURL);
                        
                        // Clean up old thumbnail
                        if (d.thumbnailURL) {
                            URL.revokeObjectURL(d.thumbnailURL);
                        }
                        d.thumbnailURL = newThumbnailURL;
                    };
                    img.src = d.fullSizeURL || URL.createObjectURL(d.originalFile);
                }
                
                // Update all visual elements with new size
                const node = container.selectAll('g.image-node').filter(nd => nd.id === d.id);
                
                // Update clip path
                node.select('clipPath rect')
                    .attr('x', -newSize / 2)
                    .attr('y', -newSize / 2)
                    .attr('width', newSize)
                    .attr('height', newSize);
                
                // Update background rect
                node.select('.image-square')
                    .attr('x', -newSize / 2)
                    .attr('y', -newSize / 2)
                    .attr('width', newSize)
                    .attr('height', newSize);
                
                // Update image with new size
                node.select('image')
                    .attr('x', -newSize / 2)
                    .attr('y', -newSize / 2)
                    .attr('width', newSize)
                    .attr('height', newSize);
                
                // Update resize handles
                node.selectAll('.resize-handle')
                    .attr('cx', (_, i) => {
                        const positions = [{x: 1, y: -1}, {x: 1, y: 1}, {x: -1, y: 1}, {x: -1, y: -1}];
                        return positions[i].x * newSize / 2;
                    })
                    .attr('cy', (_, i) => {
                        const positions = [{x: 1, y: -1}, {x: 1, y: 1}, {x: -1, y: 1}, {x: -1, y: -1}];
                        return positions[i].y * newSize / 2;
                    });
                
                // Update physics collision radius and restart simulation
                if (simulation) {
                    simulation.force('collide', perfectCollisionForce());
                    simulation.alpha(0.2).restart();
                }
            }
        }

        function resizeEnded(event, d) {
            resizeMode = false;
            resizingNode = null;
            d.fx = null;
            d.fy = null;
        }

        // Utility functions
        function resetPositions() {
            images.forEach((d, index) => {
                const rowHeight = d.size + 10;
                const imagesPerRow = Math.floor(width / (d.size + 10));
                const row = Math.floor(index / imagesPerRow);
                const col = index % imagesPerRow;
                
                const resetX = (col + 0.5) * (width / imagesPerRow);
                const resetY = (row + 0.5) * rowHeight + 50;
                
                d.x = resetX + (Math.random() - 0.5) * 15;
                d.y = resetY + (Math.random() - 0.5) * 15;
                d.fx = null;
                d.fy = null;
            });
            
            updateCanvasHeight();
            if (simulation) simulation.alpha(0.3).restart();
        }

        function clearImages() {
            images.forEach(d => {
                URL.revokeObjectURL(d.thumbnailURL);
                if (d.fullSizeURL) URL.revokeObjectURL(d.fullSizeURL);
            });
            images = [];
            draggedNode = null;
            resizingNode = null;
            container.selectAll('g').remove();
            document.getElementById('drop-zone').classList.remove('hidden');
            document.getElementById('image-count').textContent = '0 squares';
            if (simulation) simulation.stop();
        }

        // File handling
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const imageInput = document.getElementById('image-input');

        dropZone.addEventListener('click', () => {
            if (confirm('Load folder of images? (OK = folder, Cancel = individual files)')) {
                fileInput.click();
            } else {
                imageInput.click();
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                loadImages(files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadImages(e.target.files);
            }
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadImages(e.target.files);
            }
        });

        // Initialize
        svg.attr('width', width).attr('height', height);
        canvasHeight = height;
    </script>
</body>
</html>
