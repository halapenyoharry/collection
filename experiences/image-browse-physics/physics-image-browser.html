<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Image Browser - Perfect Edition</title>
    <script src="../_vendor/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        #container {
            width: 100vw;
            min-height: 100vh;
            position: relative;
        }

        #drop-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 200px;
            border: 3px dashed rgba(255,255,255,0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 10;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.3);
        }

        #drop-zone.dragover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        #drop-zone.hidden {
            display: none;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg:active {
            cursor: grabbing;
        }

        .image-node {
            cursor: move;
        }

        .image-node:hover .image-square {
            stroke: rgba(0, 255, 136, 0.6);
            stroke-width: 2;
            filter: brightness(1.1);
        }

        .image-node.dragging .image-square {
            stroke: rgba(255, 215, 0, 0.8);
            stroke-width: 3;
            filter: brightness(1.2) drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        .resize-handle {
            fill: rgba(255, 255, 255, 0.8);
            stroke: rgba(0, 0, 0, 0.5);
            stroke-width: 1;
            cursor: nw-resize;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .image-node:hover .resize-handle {
            opacity: 1;
        }

        .resize-handle:hover {
            fill: rgba(0, 255, 136, 0.9);
            stroke: rgba(0, 0, 0, 0.8);
        }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #image-count {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.5);
        }

        #file-input {
            display: none;
        }

        #density-warning {
            position: fixed;
            top: 100px;
            right: 20px;
            background: rgba(255, 140, 0, 0.9);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
            border: 2px solid rgba(255, 165, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="drop-zone">
            Drop images for perfect physics browsing<br>
            <small>Natural file management ⬜</small>
        </div>
        
        <div id="controls">
            <div id="image-count">0 squares</div>
            <button onclick="resetPositions()">Reset</button>
            <button onclick="clearImages()">Clear</button>
        </div>

        <div id="density-warning">
            ⚠️ Large collection detected! Performance may decrease with 500+ images.
        </div>

        <input type="file" id="file-input" multiple accept="image/*" webkitdirectory>
        <input type="file" id="image-input" multiple accept="image/*">
        
        <svg id="physics-canvas"></svg>
    </div>

    <script>
        // Perfect physics with density management
        let width = window.innerWidth;
        let height = window.innerHeight;
        let canvasHeight = height;
        let images = [];
        let simulation;
        let draggedNode = null;
        let resizeMode = false;
        let resizingNode = null;
        
        const svg = d3.select('#physics-canvas');
        const container = svg.append('g');
        
        // Handle window resize
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            svg.attr('width', width);
            
            updateCanvasHeight();
            
            if (simulation) {
                simulation.force('boundary', boundaryForce());
                simulation.alpha(0.1).restart();
            }
        });

        // Update canvas height - only expand down, strong top boundary
        function updateCanvasHeight() {
            if (images.length === 0) {
                canvasHeight = height;
                svg.attr('height', canvasHeight);
                return;
            }
            
            // Only track bottom expansion, keep top at 0
            const maxY = d3.max(images, d => d.y + d.size / 2) || height;
            canvasHeight = Math.max(height, maxY + 100);
            svg.attr('height', canvasHeight);
        }

        // Strong boundary force - prevents all overflow issues
        function boundaryForce() {
            return function(alpha) {
                images.forEach(d => {
                    const padding = 5;
                    const radius = d.size / 2;
                    
                    // Strong horizontal boundaries - prevent cutoffs
                    if (d.x - radius < padding) {
                        d.x = padding + radius;
                        d.vx = Math.abs(d.vx) * 0.3;
                    }
                    if (d.x + radius > width - padding) {
                        d.x = width - padding - radius;
                        d.vx = -Math.abs(d.vx) * 0.3;
                    }
                    
                    // STRONG top boundary - images CANNOT go above viewport
                    if (d.y - radius < 30) {
                        d.y = 30 + radius; // Hard boundary
                        d.vy = Math.abs(d.vy) * 0.8; // Strong bounce down
                    }
                    
                    // Update canvas height for downward expansion only
                    if (d.y + radius > canvasHeight - 50) {
                        updateCanvasHeight();
                    }
                });
            };
        }

        // Stronger collision force for high density
        function perfectCollisionForce() {
            const density = images.length / (width * height / 10000); // images per 100x100 area
            const strength = Math.min(1.0, 0.7 + density * 0.3); // Increase strength with density
            const iterations = density > 0.5 ? 4 : 3; // More iterations for high density
            
            return d3.forceCollide()
                .radius(d => d.size / 2 + 2)
                .strength(strength)
                .iterations(iterations);
        }

        // Smart size calculation with density warnings
        function calculateOptimalSize(imageCount) {
            // Show density warning
            if (imageCount > 500) {
                document.getElementById('density-warning').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('density-warning').style.display = 'none';
                }, 4000);
            }
            
            // Try to fit in viewport efficiently
            const viewportArea = width * height * 0.8;
            const areaPerImage = viewportArea / imageCount;
            let sideLength = Math.sqrt(areaPerImage);
            
            // Size tiers with reasonable limits
            let optimalSize;
            if (imageCount <= 20) optimalSize = Math.min(200, sideLength);
            else if (imageCount <= 100) optimalSize = Math.min(150, sideLength);
            else if (imageCount <= 300) optimalSize = Math.min(120, sideLength);
            else if (imageCount <= 600) optimalSize = Math.min(100, sideLength);
            else if (imageCount <= 1000) optimalSize = Math.min(80, sideLength);
            else if (imageCount <= 2000) optimalSize = Math.min(60, sideLength);
            else optimalSize = Math.min(45, sideLength); // Minimum for extreme cases
            
            return Math.max(30, optimalSize);
        }

        // Generate high-quality square thumbnail
        function generateSquareThumbnail(img, size) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = size;
            canvas.height = size;
            
            // Ultra high quality
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            // Smart square crop from center
            const sourceSize = Math.min(img.naturalWidth, img.naturalHeight);
            const sourceX = (img.naturalWidth - sourceSize) / 2;
            const sourceY = (img.naturalHeight - sourceSize) / 2;
            
            ctx.drawImage(img, sourceX, sourceY, sourceSize, sourceSize, 0, 0, size, size);
            
            return canvas.toDataURL('image/jpeg', 0.92);
        }

        // Load images with top-down organization
        async function loadImages(files) {
            document.getElementById('drop-zone').classList.add('hidden');
            
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            const optimalSize = calculateOptimalSize(imageFiles.length);
            
            console.log(`Loading ${imageFiles.length} squares at ${optimalSize}px each`);
            
            images = [];
            let loadedCount = 0;
            
            // Progress indicator
            const progressDiv = document.createElement('div');
            progressDiv.style.cssText = `
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.9); color: white; padding: 20px; border-radius: 8px;
                font-size: 16px; z-index: 1000; text-align: center;
                border: 2px solid rgba(0, 255, 136, 0.5);
            `;
            document.body.appendChild(progressDiv);
            
            for (let index = 0; index < imageFiles.length; index++) {
                const file = imageFiles[index];
                
                try {
                    const img = new Image();
                    const url = URL.createObjectURL(file);
                    
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    
                    const thumbnailURL = generateSquareThumbnail(img, optimalSize);
                    URL.revokeObjectURL(url);
                    
                    // Organized grid starting positions
                    const rowHeight = optimalSize + 15;
                    const imagesPerRow = Math.floor((width - 20) / (optimalSize + 15));
                    const row = Math.floor(index / imagesPerRow);
                    const col = index % imagesPerRow;
                    
                    const startX = 20 + (col + 0.5) * ((width - 40) / imagesPerRow);
                    const startY = 50 + (row + 0.5) * rowHeight;
                    
                    images.push({
                        id: index,
                        thumbnailURL: thumbnailURL,
                        size: optimalSize,
                        x: startX + (Math.random() - 0.5) * 10,
                        y: startY + (Math.random() - 0.5) * 10,
                        originalFile: file,
                        fullSizeURL: null
                    });
                    
                } catch (error) {
                    console.log(`Failed to process ${file.name}:`, error);
                }
                
                loadedCount++;
                progressDiv.textContent = `Processing: ${loadedCount}/${imageFiles.length}`;
            }
            
            document.body.removeChild(progressDiv);
            document.getElementById('image-count').textContent = `${images.length} squares`;
            
            renderSquares();
            updateCanvasHeight();
            initSimulation();
        }

        // Initialize stable physics
        function initSimulation() {
            simulation = d3.forceSimulation(images)
                .force('collide', perfectCollisionForce())
                .force('boundary', boundaryForce())
                .velocityDecay(0.7) // More damping = more stability
                .alphaDecay(0.02) // Slower cooldown
                .on('tick', ticked)
                .on('end', () => updateCanvasHeight());
        }

        function ticked() {
            container.selectAll('g.image-node')
                .attr('transform', d => `translate(${d.x},${d.y})`);
        }

        // Render perfect squares with resize handles
        function renderSquares() {
            const nodes = container.selectAll('g.image-node')
                .data(images, d => d.id);
            
            const nodeEnter = nodes.enter()
                .append('g')
                .attr('class', 'image-node')
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded));
            
            // Clipping path for perfect squares
            nodeEnter.append('defs')
                .append('clipPath')
                .attr('id', d => `clip-${d.id}`)
                .append('rect')
                .attr('x', d => -d.size / 2)
                .attr('y', d => -d.size / 2)
                .attr('width', d => d.size)
                .attr('height', d => d.size)
                .attr('rx', 4);
            
            const imageGroup = nodeEnter.append('g')
                .attr('class', 'image-container');
            
            // Square border
            imageGroup.append('rect')
                .attr('class', 'image-square')
                .attr('x', d => -d.size / 2)
                .attr('y', d => -d.size / 2)
                .attr('width', d => d.size)
                .attr('height', d => d.size)
                .attr('rx', 4)
                .attr('fill', 'transparent')
                .attr('stroke', 'rgba(255,255,255,0.2)')
                .attr('stroke-width', 1);
            
            // Perfect square image
            imageGroup.append('image')
                .attr('href', d => d.thumbnailURL)
                .attr('x', d => -d.size / 2)
                .attr('y', d => -d.size / 2)
                .attr('width', d => d.size)
                .attr('height', d => d.size)
                .attr('clip-path', d => `url(#clip-${d.id})`)
                .style('cursor', 'pointer')
                .on('click', showDetailView);
            
            // Corner resize handles
            const handlePositions = [
                {x: 1, y: -1, cursor: 'ne-resize'},
                {x: 1, y: 1, cursor: 'se-resize'},
                {x: -1, y: 1, cursor: 'sw-resize'},
                {x: -1, y: -1, cursor: 'nw-resize'}
            ];
            
            handlePositions.forEach((pos) => {
                imageGroup.append('circle')
                    .attr('class', 'resize-handle')
                    .attr('cx', d => pos.x * d.size / 2)
                    .attr('cy', d => pos.y * d.size / 2)
                    .attr('r', 6)
                    .style('cursor', pos.cursor)
                    .call(d3.drag()
                        .on('start', (event, d) => resizeStarted(event, d, pos))
                        .on('drag', (event, d) => resizeDragged(event, d, pos))
                        .on('end', resizeEnded));
            });
            
            nodes.exit().remove();
        }

        // Perfect drag behavior
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.1).restart();
            draggedNode = d;
            d.fx = d.x;
            d.fy = d.y;
            d3.select(this).classed('dragging', true);
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
            updateCanvasHeight();
        }

        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            draggedNode = null;
            d.fx = null;
            d.fy = null;
            d3.select(this).classed('dragging', false);
            setTimeout(() => updateCanvasHeight(), 500);
        }

        // Full-size detail view
        async function showDetailView(event, d) {
            event.stopPropagation();
            
            if (!d.fullSizeURL) {
                d.fullSizeURL = URL.createObjectURL(d.originalFile);
            }
            
            const modal = d3.select('body').append('div')
                .style('position', 'fixed')
                .style('top', '0')
                .style('left', '0')
                .style('width', '100%')
                .style('height', '100%')
                .style('background', 'rgba(0,0,0,0.95)')
                .style('z-index', '2000')
                .style('display', 'flex')
                .style('align-items', 'center')
                .style('justify-content', 'center')
                .style('cursor', 'pointer')
                .on('click', function() { modal.remove(); });
            
            modal.append('img')
                .attr('src', d.fullSizeURL)
                .style('max-width', '90%')
                .style('max-height', '90%')
                .style('border-radius', '8px')
                .style('box-shadow', '0 0 50px rgba(0, 255, 136, 0.3)');
            
            modal.append('div')
                .style('position', 'absolute')
                .style('bottom', '30px')
                .style('color', 'white')
                .style('font-size', '16px')
                .style('background', 'rgba(0,0,0,0.8)')
                .style('padding', '12px 20px')
                .style('border-radius', '8px')
                .text(d.originalFile.name);
        }

        // Resize functionality with proper handle behavior
        let initialResizeDistance = 0;
        let initialResizeSize = 0;
        
        function resizeStarted(event, d, handle) {
            event.sourceEvent.stopPropagation();
            resizeMode = true;
            resizingNode = d;
            d.fx = d.x;
            d.fy = d.y;
            
            // Store initial distance and size when grab starts
            const dx = event.x - d.x;
            const dy = event.y - d.y;
            initialResizeDistance = Math.sqrt(dx * dx + dy * dy);
            initialResizeSize = d.size;
        }

        function resizeDragged(event, d, handle) {
            // Calculate current distance from center
            const dx = event.x - d.x;
            const dy = event.y - d.y;
            const currentDistance = Math.sqrt(dx * dx + dy * dy);
            
            // Calculate size change based on distance change from initial grab
            const distanceChange = currentDistance - initialResizeDistance;
            const newSize = Math.max(25, Math.min(500, initialResizeSize + (distanceChange * 2)));
            
            if (Math.abs(newSize - d.size) > 2) { // Only update if change is significant
                d.size = newSize;
                
                // Generate new thumbnail at new size
                if (d.originalFile) {
                    const img = new Image();
                    img.onload = function() {
                        const newThumbnailURL = generateSquareThumbnail(img, newSize);
                        const node = container.selectAll('g.image-node').filter(nd => nd.id === d.id);
                        node.select('image').attr('href', newThumbnailURL);
                        if (d.thumbnailURL) URL.revokeObjectURL(d.thumbnailURL);
                        d.thumbnailURL = newThumbnailURL;
                    };
                    img.src = d.fullSizeURL || URL.createObjectURL(d.originalFile);
                }
                
                // Update all visual elements
                const node = container.selectAll('g.image-node').filter(nd => nd.id === d.id);
                
                node.select('clipPath rect')
                    .attr('x', -newSize / 2)
                    .attr('y', -newSize / 2)
                    .attr('width', newSize)
                    .attr('height', newSize);
                
                node.select('.image-square')
                    .attr('x', -newSize / 2)
                    .attr('y', -newSize / 2)
                    .attr('width', newSize)
                    .attr('height', newSize);
                
                node.select('image')
                    .attr('x', -newSize / 2)
                    .attr('y', -newSize / 2)
                    .attr('width', newSize)
                    .attr('height', newSize);
                
                node.selectAll('.resize-handle')
                    .attr('cx', (_, i) => {
                        const positions = [{x: 1, y: -1}, {x: 1, y: 1}, {x: -1, y: 1}, {x: -1, y: -1}];
                        return positions[i].x * newSize / 2;
                    })
                    .attr('cy', (_, i) => {
                        const positions = [{x: 1, y: -1}, {x: 1, y: 1}, {x: -1, y: 1}, {x: -1, y: -1}];
                        return positions[i].y * newSize / 2;
                    });
                
                if (simulation) {
                    // CRITICAL: Must restart simulation after collision radius change
                    simulation.force('collide', perfectCollisionForce());
                    simulation.alpha(0.3).restart(); // This is the key fix!
                }
            }
        }

        function resizeEnded(event, d) {
            resizeMode = false;
            resizingNode = null;
            d.fx = null;
            d.fy = null;
            
            // Clear resize tracking variables
            initialResizeDistance = 0;
            initialResizeSize = 0;
        }

        // Utility functions
        function resetPositions() {
            const rowHeight = 80;
            const imagesPerRow = Math.floor((width - 20) / 80);
            
            images.forEach((d, index) => {
                const row = Math.floor(index / imagesPerRow);
                const col = index % imagesPerRow;
                
                d.x = 50 + (col * 80) + (Math.random() - 0.5) * 15;
                d.y = 50 + (row * rowHeight) + (Math.random() - 0.5) * 15;
                d.fx = null;
                d.fy = null;
            });
            
            updateCanvasHeight();
            if (simulation) simulation.alpha(0.3).restart();
        }

        function clearImages() {
            images.forEach(d => {
                URL.revokeObjectURL(d.thumbnailURL);
                if (d.fullSizeURL) URL.revokeObjectURL(d.fullSizeURL);
            });
            images = [];
            draggedNode = null;
            resizingNode = null;
            container.selectAll('g').remove();
            document.getElementById('drop-zone').classList.remove('hidden');
            document.getElementById('image-count').textContent = '0 squares';
            if (simulation) simulation.stop();
            canvasHeight = height;
            svg.attr('height', canvasHeight);
        }

        // File handling
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const imageInput = document.getElementById('image-input');

        dropZone.addEventListener('click', () => {
            if (confirm('Load folder of images? (OK = folder, Cancel = individual files)')) {
                fileInput.click();
            } else {
                imageInput.click();
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                loadImages(files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadImages(e.target.files);
            }
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadImages(e.target.files);
            }
        });

        // Initialize
        svg.attr('width', width).attr('height', height);
        canvasHeight = height;
    </script>
</body>
</html>
