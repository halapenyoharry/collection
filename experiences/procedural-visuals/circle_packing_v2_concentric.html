<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concentric Circle Packing Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0d8c8;
    font-family: 'Courier New', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #controls {
    width: 280px;
    min-width: 280px;
    padding: 16px;
    background: #2a2520;
    overflow-y: auto;
    border-right: 1px solid #4a4035;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #controls h2 {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8b89a;
    margin-bottom: 2px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .control-group label {
    font-size: 10px;
    color: #a09080;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .control-group input[type="range"] {
    width: 100%;
    accent-color: #c8a050;
    cursor: pointer;
  }
  .control-group .val {
    font-size: 10px;
    color: #c8b89a;
    text-align: right;
  }
  button#generate {
    margin-top: 6px;
    padding: 10px;
    background: #c8a050;
    color: #1a1a1a;
    border: none;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: bold;
  }
  button#generate:hover { background: #ddb060; }
  button#save {
    padding: 8px;
    background: transparent;
    color: #a09080;
    border: 1px solid #4a4035;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  button#save:hover { border-color: #c8a050; color: #c8b89a; }
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: #111;
  }
  canvas { max-width: 100%; max-height: 100%; }
  .sep { border-top: 1px solid #3a3530; margin: 4px 0; }
  #status { font-size: 10px; color: #807060; min-height: 14px; }
</style>
</head>
<body>

<div id="controls">
  <h2>Circle Packing</h2>

  <div class="control-group">
    <label>Recursion Depth</label>
    <input type="range" id="maxDepth" min="2" max="5" value="4" step="1">
    <div class="val" id="maxDepthVal">4</div>
  </div>

  <div class="control-group">
    <label>Pack Attempts</label>
    <input type="range" id="density" min="500" max="6000" value="3500" step="100">
    <div class="val" id="densityVal">3500</div>
  </div>

  <div class="control-group">
    <label>Min Circle Radius</label>
    <input type="range" id="minSize" min="2" max="12" value="3" step="1">
    <div class="val" id="minSizeVal">3</div>
  </div>

  <div class="control-group">
    <label>Max Start Radius</label>
    <input type="range" id="maxRadius" min="60" max="300" value="160" step="10">
    <div class="val" id="maxRadiusVal">160</div>
  </div>

  <div class="control-group">
    <label>Concentric Rings</label>
    <input type="range" id="rings" min="1" max="6" value="3" step="1">
    <div class="val" id="ringsVal">3</div>
  </div>

  <div class="control-group">
    <label>Accent Chance (%)</label>
    <input type="range" id="accentProb" min="0" max="40" value="8" step="1">
    <div class="val" id="accentProbVal">8%</div>
  </div>

  <div class="control-group">
    <label>Gap Fill Density</label>
    <input type="range" id="gapFill" min="0" max="100" value="90" step="5">
    <div class="val" id="gapFillVal">90%</div>
  </div>

  <div class="control-group">
    <label>Stroke Weight</label>
    <input type="range" id="lineWidth" min="0.3" max="2.5" value="0.7" step="0.1">
    <div class="val" id="lineWidthVal">0.7</div>
  </div>

  <div class="control-group">
    <label>Circle Padding</label>
    <input type="range" id="padding" min="0" max="6" value="1" step="0.5">
    <div class="val" id="paddingVal">1</div>
  </div>

  <div class="sep"></div>

  <div class="control-group">
    <label>Seed</label>
    <input type="range" id="seed" min="1" max="9999" value="42" step="1">
    <div class="val" id="seedVal">42</div>
  </div>

  <button id="generate">Generate</button>
  <button id="save">Save PNG</button>
  <div id="status"></div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<script>
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

let rng;

const PALETTE = {
  bg: '#3d3535',
  fill: ['#f0ead6','#ede7d1','#e8e2cc','#f2eddb','#eee8d4','#ebe5cf'],
  stroke: '#5a4838',
  accents: [
    '#2255aa','#3366cc',
    '#6fc8d0','#5bbac4',
    '#aa2233','#cc3344',
    '#d4a020','#e8b830',
    '#e87820',
  ]
};

function getSettings() {
  return {
    maxDepth: +document.getElementById('maxDepth').value,
    density: +document.getElementById('density').value,
    minSize: +document.getElementById('minSize').value,
    maxRadius: +document.getElementById('maxRadius').value,
    rings: +document.getElementById('rings').value,
    accentProb: +document.getElementById('accentProb').value / 100,
    gapFill: +document.getElementById('gapFill').value / 100,
    lineWidth: +document.getElementById('lineWidth').value,
    padding: +document.getElementById('padding').value,
    seed: +document.getElementById('seed').value,
  };
}

function packCircles(bx, by, br, minR, maxR, attempts, pad) {
  const placed = [];
  for (let i = 0; i < attempts; i++) {
    const t = rng();
    let r;
    if (t < 0.2) r = minR + rng() * (maxR - minR); // some large
    else if (t < 0.55) r = minR + rng() * Math.max(maxR * 0.35, minR); // medium
    else r = minR + rng() * Math.max(maxR * 0.12, minR); // many small
    r = Math.max(r, minR);
    if (r > br * 0.9) continue;

    const angle = rng() * Math.PI * 2;
    const maxDist = br - r - pad * 0.3;
    if (maxDist <= 0) continue;
    const dist = Math.sqrt(rng()) * maxDist; // sqrt for uniform area distribution
    const x = bx + Math.cos(angle) * dist;
    const y = by + Math.sin(angle) * dist;

    if (Math.hypot(x - bx, y - by) + r > br - pad * 0.3) continue;

    let ok = true;
    for (let j = 0; j < placed.length; j++) {
      if (Math.hypot(x - placed[j].x, y - placed[j].y) < r + placed[j].r + pad) {
        ok = false; break;
      }
    }
    if (ok) placed.push({x, y, r});
  }
  return placed;
}

function packRect(W, H, minR, maxR, attempts, pad) {
  const placed = [];
  for (let i = 0; i < attempts; i++) {
    const t = rng();
    let r;
    if (t < 0.12) r = maxR * (0.6 + rng() * 0.4);
    else if (t < 0.35) r = maxR * (0.3 + rng() * 0.3);
    else if (t < 0.65) r = maxR * (0.1 + rng() * 0.2);
    else r = minR + rng() * Math.max(maxR * 0.1, minR);
    r = Math.max(r, minR);

    const x = r + rng() * (W - 2 * r);
    const y = r + rng() * (H - 2 * r);

    let ok = true;
    for (let j = 0; j < placed.length; j++) {
      if (Math.hypot(x - placed[j].x, y - placed[j].y) < r + placed[j].r + pad) {
        ok = false; break;
      }
    }
    if (ok) placed.push({x, y, r});
  }
  return placed;
}

function drawCircle(ctx, cx, cy, r, depth, s) {
  if (r < 1.5) return;

  const fillColor = PALETTE.fill[Math.floor(rng() * PALETTE.fill.length)];
  const isAccent = rng() < s.accentProb;
  const accent1 = PALETTE.accents[Math.floor(rng() * PALETTE.accents.length)];
  const accent2 = PALETTE.accents[Math.floor(rng() * PALETTE.accents.length)];

  // Fill base
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = fillColor;
  ctx.fill();

  // Outer stroke
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = isAccent ? accent1 : PALETTE.stroke;
  ctx.lineWidth = s.lineWidth * (isAccent ? 2 : 1.1);
  ctx.stroke();

  // Concentric rings
  const maxRings = Math.min(s.rings, Math.max(1, Math.floor(r / 10)));
  for (let i = 0; i < maxRings; i++) {
    const frac = (i + 1) / (maxRings + 1.5);
    const ringR = r * (1 - frac);
    if (ringR < 2) break;
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
    if (isAccent && i === 0) {
      ctx.strokeStyle = accent1;
      ctx.lineWidth = s.lineWidth * 1.4;
    } else {
      ctx.strokeStyle = PALETTE.stroke;
      ctx.lineWidth = s.lineWidth * 0.7;
    }
    ctx.stroke();
  }

  // Accent inner fill dot
  if (isAccent && r > 6) {
    const ir = r * (0.1 + rng() * 0.15);
    ctx.beginPath();
    ctx.arc(cx, cy, ir, 0, Math.PI * 2);
    ctx.fillStyle = accent1;
    ctx.fill();
    // Sometimes a second colored ring
    if (rng() < 0.45 && r > 14) {
      const mr = r * (0.28 + rng() * 0.12);
      ctx.beginPath();
      ctx.arc(cx, cy, mr, 0, Math.PI * 2);
      ctx.strokeStyle = accent2;
      ctx.lineWidth = s.lineWidth * 1.3;
      ctx.stroke();
    }
  }

  // Recurse: pack children inside
  if (depth < s.maxDepth && r > s.minSize * 5) {
    const childMaxR = r * 0.42;
    const attFactor = Math.max(0.25, r / s.maxRadius);
    const childAttempts = Math.floor(s.density * 0.4 * attFactor);
    const children = packCircles(
      cx, cy, r * 0.85,
      Math.max(s.minSize, 2), childMaxR,
      Math.max(childAttempts, 80),
      s.padding * 0.7
    );
    children.sort((a, b) => b.r - a.r);
    for (const child of children) {
      drawCircle(ctx, child.x, child.y, child.r, depth + 1, s);
    }
  } else if (r > 3.5) {
    // Terminal circle: center dot
    const dotR = r * (0.18 + rng() * 0.12);
    ctx.beginPath();
    ctx.arc(cx, cy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = rng() < s.accentProb
      ? PALETTE.accents[Math.floor(rng() * PALETTE.accents.length)]
      : PALETTE.stroke;
    ctx.fill();
  }
}

function generate() {
  const s = getSettings();
  rng = mulberry32(s.seed);
  const status = document.getElementById('status');
  status.textContent = 'Generating...';

  setTimeout(() => {
    const canvas = document.getElementById('c');
    const W = 1400, H = 900;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = PALETTE.bg;
    ctx.fillRect(0, 0, W, H);

    // Main packing
    const topCircles = packRect(W, H, s.minSize, s.maxRadius, s.density, s.padding);
    topCircles.sort((a, b) => b.r - a.r);

    // Collect all placed circles for gap detection
    const allTop = [...topCircles];

    for (const c of topCircles) {
      drawCircle(ctx, c.x, c.y, c.r, 0, s);
    }

    // Gap filling: multiple passes of decreasing size
    if (s.gapFill > 0) {
      const passes = [
        { maxR: 18, minR: 5, attempts: Math.floor(4000 * s.gapFill) },
        { maxR: 8, minR: 3, attempts: Math.floor(5000 * s.gapFill) },
        { maxR: 4, minR: 1.5, attempts: Math.floor(4000 * s.gapFill) },
      ];

      for (const pass of passes) {
        for (let i = 0; i < pass.attempts; i++) {
          const r = pass.minR + rng() * (pass.maxR - pass.minR);
          const x = r + rng() * (W - 2 * r);
          const y = r + rng() * (H - 2 * r);

          let ok = true;
          for (let j = 0; j < allTop.length; j++) {
            if (Math.hypot(x - allTop[j].x, y - allTop[j].y) < r + allTop[j].r + s.padding * 0.4) {
              ok = false; break;
            }
          }
          if (ok) {
            allTop.push({x, y, r});
            drawCircle(ctx, x, y, r, s.maxDepth - 1, s);
          }
        }
      }

      // Tiny dots in remaining gaps
      for (let i = 0; i < Math.floor(5000 * s.gapFill); i++) {
        const x = rng() * W, y = rng() * H;
        const r = 0.5 + rng() * 1.5;
        let ok = true;
        for (let j = 0; j < allTop.length; j++) {
          if (Math.hypot(x - allTop[j].x, y - allTop[j].y) < allTop[j].r + 0.3) {
            ok = false; break;
          }
        }
        if (ok) {
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = PALETTE.stroke;
          ctx.globalAlpha = 0.3 + rng() * 0.35;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    status.textContent = `Done — ${topCircles.length} top-level circles`;
  }, 20);
}

// Wire controls
const sliders = ['maxDepth','density','minSize','maxRadius','rings','accentProb','gapFill','lineWidth','padding','seed'];
sliders.forEach(id => {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + 'Val');
  el.addEventListener('input', () => {
    let v = el.value;
    if (id === 'accentProb' || id === 'gapFill') v += '%';
    valEl.textContent = v;
  });
});

document.getElementById('generate').addEventListener('click', generate);
document.getElementById('save').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'circle_packing.png';
  link.href = document.getElementById('c').toDataURL('image/png');
  link.click();
});

generate();
</script>
</body>
</html>
