<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topological Layer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: #5a4838;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 10;
  }
  #ui span { color: #8a7a60; }
  #controls {
    position: fixed;
    top: 16px;
    right: 16px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: #6a5a48;
    letter-spacing: 1px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
    background: rgba(10,10,10,0.7);
    padding: 12px;
    border: 1px solid #2a2218;
  }
  #controls label {
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  #controls input[type="range"] {
    width: 100px;
    accent-color: #6a5a48;
  }
  #controls button {
    background: none;
    border: 1px solid #3a3028;
    color: #8a7a60;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 8px;
    cursor: pointer;
    text-transform: uppercase;
  }
  #controls button:hover { border-color: #aa9a70; color: #aa9a70; }
</style>
</head>
<body>
<div id="ui">
  <div>STATES: <span id="stateCount">0</span> | DECOHERENCE EVENTS: <span id="decoEvents">0</span> | NEGENTROPY: <span id="negentropy">0</span></div>
</div>
<div id="controls">
  <label>COHERENCE <input type="range" id="coherence" min="0" max="100" value="70"> <span id="coherenceVal">70</span></label>
  <label>OBSERVATION <input type="range" id="observation" min="0" max="100" value="20"> <span id="observationVal">20</span></label>
  <label>INTEGRATION <input type="range" id="integration" min="0" max="100" value="50"> <span id="integrationVal">50</span></label>
  <label>TIME SCALE <input type="range" id="timeScale" min="1" max="200" value="60"> <span id="timeScaleVal">60</span></label>
  <button id="reseed">RESEED</button>
  <button id="savePng">SAVE</button>
</div>
<canvas id="c"></canvas>

<script>
// ============================================================
// TOPOLOGICAL LAYER
// A 2D projection of Hilbert space where:
//   - Circles are state vectors (probability amplitudes as radius)
//   - Containment is entanglement (subsystems within systems)
//   - Boundaries are decoherence surfaces
//   - Phase drives orbital position and color
//   - Interference creates density variation
//   - Observation collapses: reduces children, hardens boundaries
//   - Integration (negentropy) builds structure against entropy
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Seeded PRNG
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

let globalSeed = Math.floor(Math.random() * 99999);
let rng;

// Palette: cream substrate, brown decoherence boundaries,
// accent colors are eigenstates (measurement outcomes)
const CREAM = ['#f0ead6','#ede7d1','#e8e2cc','#f2eddb','#eee8d4'];
const STROKE = '#5a4838';
const STROKE_FAINT = '#3a2e22';
const BG = '#1e1a16';
// Eigenstate colors — each represents a basis state
const EIGEN = [
  '#2255aa', // |0⟩ blue
  '#6fc8d0', // |1⟩ cyan
  '#aa2233', // |2⟩ red
  '#d4a020', // |3⟩ gold
  '#e87820', // |4⟩ orange
  '#3a8855', // |5⟩ green
  '#cc3366', // |6⟩ rose
  '#7744bb', // |7⟩ violet
];

// ============================================================
// STATE TREE — the Hilbert space topology
// ============================================================

class QState {
  constructor(x, y, r, depth, parent, eigenIndex) {
    this.x = x;
    this.y = y;
    this.r = r;
    this.baseR = r;
    this.depth = depth;
    this.parent = parent;
    this.children = [];
    this.eigenIndex = eigenIndex; // which basis state this projects onto
    this.phase = rng() * Math.PI * 2; // quantum phase
    this.phaseVel = (rng() - 0.5) * 0.02; // phase evolution rate
    this.orbitAngle = rng() * Math.PI * 2;
    this.orbitR = parent ? (rng() * 0.3 + 0.2) * parent.r : 0;
    this.orbitVel = (rng() - 0.5) * 0.005;
    this.amplitude = 0.5 + rng() * 0.5; // probability amplitude
    this.coherent = true; // still in superposition?
    this.decoherenceTime = -1;
    this.fillIdx = Math.floor(rng() * CREAM.length);
    this.rings = Math.max(1, Math.floor(r / 18));
    this.integrated = false; // has negentropy built structure here?
    this.integrationStrength = 0;
    // Interference pattern: nodes where wavefunction cancels
    this.interferencePhase = rng() * Math.PI * 2;
    this.interferenceFreq = 1 + rng() * 3;
  }
}

let rootStates = [];
let allStates = [];
let decoCount = 0;
let totalNegentropy = 0;

function packRect(W, H, minR, maxR, attempts, pad) {
  const placed = [];
  for (let i = 0; i < attempts; i++) {
    const t = rng();
    let r;
    if (t < 0.08) r = maxR * (0.7 + rng() * 0.3);
    else if (t < 0.25) r = maxR * (0.35 + rng() * 0.35);
    else if (t < 0.55) r = maxR * (0.12 + rng() * 0.23);
    else r = minR + rng() * Math.max(maxR * 0.12, minR);
    r = Math.max(r, minR);
    const x = r + rng() * (W - 2*r);
    const y = r + rng() * (H - 2*r);
    let ok = true;
    for (const p of placed) {
      if (Math.hypot(x-p.x, y-p.y) < r + p.r + pad) { ok = false; break; }
    }
    if (ok) placed.push({x,y,r});
  }
  return placed;
}

function buildTree(state, depth, maxDepth, s) {
  if (depth >= maxDepth || state.r < 6) return;

  const numOrbits = Math.max(1, Math.floor(state.r / 25));
  const placed = [];
  const pad = 1.5;

  for (let oi = 0; oi < numOrbits; oi++) {
    const orbitFrac = (oi + 1) / (numOrbits + 1.3);
    const orbitR = state.r * orbitFrac;
    const circumference = 2 * Math.PI * orbitR;
    const maxChildR = Math.min(state.r * 0.38, orbitR * 0.55);
    const minChildR = 3;
    if (maxChildR < minChildR) continue;

    let angle = rng() * Math.PI * 2;
    const spiralTwist = (rng() - 0.3) * 0.8;
    const estCount = Math.floor(circumference / (maxChildR * 0.8 + pad));

    for (let ci = 0; ci < estCount; ci++) {
      const t = rng();
      let cr;
      if (t < 0.2) cr = minChildR + rng() * (maxChildR - minChildR);
      else if (t < 0.55) cr = minChildR + rng() * maxChildR * 0.35;
      else cr = minChildR + rng() * maxChildR * 0.12;
      cr = Math.max(cr, minChildR);

      const wobble = orbitR * 0.2 * (rng() - 0.5);
      const dist = orbitR + wobble;
      const cx = state.x + Math.cos(angle) * dist;
      const cy = state.y + Math.sin(angle) * dist;

      if (Math.hypot(cx - state.x, cy - state.y) + cr > state.r - 1) {
        angle += 0.3;
        continue;
      }

      let ok = true;
      for (const p of placed) {
        if (Math.hypot(cx - p.x, cy - p.y) < cr + p.r + pad) { ok = false; break; }
      }
      if (ok) {
        const eigenI = Math.floor(rng() * EIGEN.length);
        const child = new QState(cx, cy, cr, depth + 1, state, eigenI);
        child.orbitAngle = angle;
        child.orbitR = dist;
        child.orbitVel = (rng() - 0.5) * 0.008 / (depth + 1);
        state.children.push(child);
        allStates.push(child);
        placed.push(child);
        buildTree(child, depth + 1, maxDepth, s);
      }

      const arcStep = (cr * 2 + pad) / Math.max(orbitR, 1);
      angle += arcStep + spiralTwist * 0.12;
    }
  }

  // Fill remaining space
  const fillAttempts = Math.floor(80 * (state.r / 160));
  for (let i = 0; i < fillAttempts; i++) {
    const cr = 2 + rng() * Math.max(state.r * 0.08, 2);
    const a = rng() * Math.PI * 2;
    const d = Math.sqrt(rng()) * (state.r - cr - 2);
    if (d <= 0) continue;
    const cx = state.x + Math.cos(a) * d;
    const cy = state.y + Math.sin(a) * d;
    if (Math.hypot(cx - state.x, cy - state.y) + cr > state.r - 1) continue;
    let ok = true;
    for (const p of placed) {
      if (Math.hypot(cx - p.x, cy - p.y) < cr + p.r + pad * 0.6) { ok = false; break; }
    }
    if (ok) {
      const eigenI = Math.floor(rng() * EIGEN.length);
      const child = new QState(cx, cy, cr, depth + 1, state, eigenI);
      state.children.push(child);
      allStates.push(child);
      placed.push(child);
      if (cr > 8) buildTree(child, depth + 1, maxDepth, {});
    }
  }
}

function buildWorld() {
  rng = mulberry32(globalSeed);
  rootStates = [];
  allStates = [];
  decoCount = 0;
  totalNegentropy = 0;

  const tops = packRect(W, H, 4, Math.min(W, H) * 0.22, 4000, 1.5);
  tops.sort((a, b) => b.r - a.r);

  for (const t of tops) {
    const eigenI = Math.floor(rng() * EIGEN.length);
    const state = new QState(t.x, t.y, t.r, 0, null, eigenI);
    rootStates.push(state);
    allStates.push(state);
    buildTree(state, 0, 4, {});
  }

  // Gap fill
  const allTop = tops.map(t => ({x:t.x, y:t.y, r:t.r}));
  const passes = [
    {maxR:16, minR:4, att:5000},
    {maxR:6, minR:2, att:6000},
  ];
  for (const pass of passes) {
    for (let i = 0; i < pass.att; i++) {
      const r = pass.minR + rng() * (pass.maxR - pass.minR);
      const x = r + rng() * (W - 2*r);
      const y = r + rng() * (H - 2*r);
      let ok = true;
      for (const p of allTop) {
        if (Math.hypot(x-p.x, y-p.y) < r + p.r + 1.2) { ok = false; break; }
      }
      if (ok) {
        allTop.push({x,y,r});
        const eigenI = Math.floor(rng() * EIGEN.length);
        const state = new QState(x, y, r, 3, null, eigenI);
        rootStates.push(state);
        allStates.push(state);
        if (r > 8) buildTree(state, 3, 4, {});
      }
    }
  }

  // Tiny gap dots as QStates too
  for (let i = 0; i < 4000; i++) {
    const r = 0.5 + rng() * 1.8;
    const x = rng() * W, y = rng() * H;
    let ok = true;
    for (const p of allTop) {
      if (Math.hypot(x-p.x, y-p.y) < p.r + 0.5) { ok = false; break; }
    }
    if (ok) {
      const eigenI = Math.floor(rng() * EIGEN.length);
      const s = new QState(x, y, r, 5, null, eigenI);
      s.isDot = true;
      rootStates.push(s);
      allStates.push(s);
    }
  }
}

// ============================================================
// PHYSICS — phase evolution, decoherence, integration
// ============================================================

function updatePhysics(dt, params) {
  const coherenceParam = params.coherence / 100;
  const observationParam = params.observation / 100;
  const integrationParam = params.integration / 100;

  totalNegentropy = 0;

  for (const s of allStates) {
    // Phase evolution (Schrödinger-like)
    s.phase += s.phaseVel * dt;

    // Orbital motion — children orbit parent
    if (s.parent && s.parent.coherent) {
      s.orbitAngle += s.orbitVel * dt * (1 + coherenceParam);
      const wobble = Math.sin(s.phase * s.interferenceFreq + s.interferencePhase) * s.orbitR * 0.08 * coherenceParam;
      s.x = s.parent.x + Math.cos(s.orbitAngle) * (s.orbitR + wobble);
      s.y = s.parent.y + Math.sin(s.orbitAngle) * (s.orbitR + wobble);
    }

    // Amplitude breathing — interference
    const interference = Math.sin(s.phase * s.interferenceFreq + s.interferencePhase);
    s.r = s.baseR * (0.92 + 0.08 * interference * coherenceParam);
    s.amplitude = 0.5 + 0.5 * Math.abs(Math.cos(s.phase));

    // Decoherence: observation pressure collapses superpositions
    if (s.coherent && s.children.length > 0) {
      const decoProb = observationParam * 0.0003 * dt * (s.depth + 1);
      if (Math.random() < decoProb) {
        s.coherent = false;
        s.decoherenceTime = performance.now();
        decoCount++;
        // Collapse: some children vanish, boundary hardens
        const survivors = Math.max(1, Math.floor(s.children.length * (0.3 + Math.random() * 0.4)));
        s.children.sort(() => Math.random() - 0.5);
        // Mark excess as fading
        for (let i = survivors; i < s.children.length; i++) {
          s.children[i].fading = true;
          s.children[i].fadeStart = performance.now();
        }
      }
    }

    // Integration (negentropy): coherent states with many children build structure
    if (s.coherent && s.children.length > 2) {
      s.integrationStrength = Math.min(1, s.integrationStrength + integrationParam * 0.0001 * dt);
      s.integrated = s.integrationStrength > 0.3;
      totalNegentropy += s.integrationStrength * s.children.length;
    }

    // Fading states shrink away
    if (s.fading) {
      const elapsed = performance.now() - s.fadeStart;
      const fadeDur = 3000;
      const t = Math.min(1, elapsed / fadeDur);
      s.r = s.baseR * (1 - t);
      s.amplitude = 1 - t;
      if (t >= 1) s.dead = true;
    }

    // Recoherence: low observation allows states to re-superpose
    if (!s.coherent && observationParam < 0.15 && coherenceParam > 0.7) {
      if (Math.random() < 0.0001 * dt) {
        s.coherent = true;
        // Revive fading children
        for (const ch of s.children) {
          if (ch.fading) {
            ch.fading = false;
            ch.r = ch.baseR;
            ch.amplitude = 0.5 + rng() * 0.5;
          }
        }
      }
    }
  }

  // Remove dead states
  for (const s of allStates) {
    if (s.children) {
      s.children = s.children.filter(c => !c.dead);
    }
  }
}

// ============================================================
// RENDERING
// ============================================================

function drawState(ctx, s, params, time) {
  if (s.dead || s.r < 0.3) return;

  const coherenceParam = params.coherence / 100;
  const observationParam = params.observation / 100;

  if (s.isDot) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = STROKE;
    ctx.globalAlpha = 0.25 + 0.15 * Math.sin(s.phase);
    ctx.fill();
    ctx.globalAlpha = 1;
    return;
  }

  const alpha = s.fading ? s.amplitude : 1;
  ctx.globalAlpha = alpha;

  // Fill — phase affects brightness subtly
  const phaseBright = 0.97 + 0.03 * Math.sin(s.phase);
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
  ctx.fillStyle = CREAM[s.fillIdx];
  ctx.fill();

  // Decoherence boundary — thicker/colored when decohered
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
  if (!s.coherent) {
    // Hard boundary: decoherence surface
    const timeSinceDeco = s.decoherenceTime > 0 ? (performance.now() - s.decoherenceTime) / 1000 : 0;
    const pulse = Math.max(0, 1 - timeSinceDeco * 0.3);
    ctx.strokeStyle = EIGEN[s.eigenIndex];
    ctx.lineWidth = (1.5 + pulse * 3) * params.lineWidth;
    ctx.stroke();
    // Eigenstate color wash
    if (pulse > 0) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = EIGEN[s.eigenIndex];
      ctx.globalAlpha = alpha * pulse * 0.08;
      ctx.fill();
      ctx.globalAlpha = alpha;
    }
  } else {
    ctx.strokeStyle = STROKE;
    ctx.lineWidth = 0.8 * params.lineWidth;
    ctx.stroke();
  }

  // Integration glow — negentropy builds visible structure
  if (s.integrated && s.integrationStrength > 0.1) {
    const glowR = s.r * (1 + s.integrationStrength * 0.08);
    ctx.beginPath();
    ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
    ctx.strokeStyle = EIGEN[s.eigenIndex];
    ctx.lineWidth = 0.4 * params.lineWidth;
    ctx.globalAlpha = alpha * s.integrationStrength * 0.3;
    ctx.stroke();
    ctx.globalAlpha = alpha;
  }

  // Orbital path rings (faint, only for coherent states)
  if (s.coherent && s.r > 12) {
    const numOrbits = Math.max(1, Math.floor(s.r / 25));
    for (let i = 0; i < numOrbits; i++) {
      const orbitFrac = (i + 1) / (numOrbits + 1.3);
      const orbitR = s.r * orbitFrac;
      if (orbitR < 3) continue;

      // Interference: orbit ring pulses with phase
      const intfAlpha = 0.12 + 0.08 * Math.sin(s.phase * (i + 1) + s.interferencePhase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, orbitR, 0, Math.PI * 2);
      ctx.strokeStyle = STROKE_FAINT;
      ctx.lineWidth = 0.35 * params.lineWidth;
      ctx.globalAlpha = alpha * intfAlpha * (coherenceParam * 0.8 + 0.2);
      ctx.stroke();
    }
    ctx.globalAlpha = alpha;
  }

  // Nucleus
  if (s.r > 4) {
    const nucleusR = s.r * (0.06 + 0.05 * Math.abs(Math.sin(s.phase * 0.5)));
    ctx.beginPath();
    ctx.arc(s.x, s.y, nucleusR, 0, Math.PI * 2);
    // Nucleus color reflects eigenstate when partially decohered
    const eigenInfluence = s.coherent ? 0.1 : 0.8;
    if (Math.random() < eigenInfluence) {
      ctx.fillStyle = EIGEN[s.eigenIndex];
    } else {
      ctx.fillStyle = STROKE;
    }
    ctx.fill();

    // Accent ring for high-amplitude states
    if (s.amplitude > 0.7 && s.r > 10) {
      const accentR = s.r * (0.18 + 0.04 * Math.sin(s.phase * 1.5));
      ctx.beginPath();
      ctx.arc(s.x, s.y, accentR, 0, Math.PI * 2);
      ctx.strokeStyle = EIGEN[s.eigenIndex];
      ctx.lineWidth = 0.5 * params.lineWidth;
      ctx.globalAlpha = alpha * 0.25 * s.amplitude;
      ctx.stroke();
    }
  }

  // Terminal circles: concentric ring + dot
  if (s.children.length === 0 && s.r > 5 && !s.isDot) {
    const ringR = s.r * (0.5 + 0.1 * Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = STROKE;
    ctx.lineWidth = 0.4 * params.lineWidth;
    ctx.globalAlpha = alpha * 0.5;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  // Draw children
  for (const child of s.children) {
    drawState(ctx, child, params, time);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================

let lastTime = 0;
let built = false;

function getParams() {
  return {
    coherence: +document.getElementById('coherence').value,
    observation: +document.getElementById('observation').value,
    integration: +document.getElementById('integration').value,
    timeScale: +document.getElementById('timeScale').value,
    lineWidth: 0.7,
  };
}

function frame(time) {
  if (!built) {
    buildWorld();
    built = true;
  }

  const params = getParams();
  const rawDt = lastTime ? (time - lastTime) : 16;
  lastTime = time;
  const dt = rawDt * params.timeScale / 60;

  updatePhysics(dt, params);

  // Render
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  for (const s of rootStates) {
    drawState(ctx, s, params, time);
  }

  // UI
  document.getElementById('stateCount').textContent = allStates.filter(s => !s.dead).length;
  document.getElementById('decoEvents').textContent = decoCount;
  document.getElementById('negentropy').textContent = totalNegentropy.toFixed(1);

  requestAnimationFrame(frame);
}

// Controls
['coherence','observation','integration','timeScale'].forEach(id => {
  const el = document.getElementById(id);
  const val = document.getElementById(id + 'Val');
  el.addEventListener('input', () => { val.textContent = el.value; });
});

document.getElementById('reseed').addEventListener('click', () => {
  globalSeed = Math.floor(Math.random() * 99999);
  built = false;
});

document.getElementById('savePng').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'topological_layer.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

requestAnimationFrame(frame);
</script>
</body>
</html>
