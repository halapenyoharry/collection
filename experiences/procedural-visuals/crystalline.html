<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystalline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0908; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  #ui button {
    background: none;
    border: 1px solid #2a2418;
    color: #6a5a40;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 10px;
    cursor: pointer;
    text-transform: uppercase;
  }
  #ui button:hover { border-color: #aa9a60; color: #aa9a60; }
</style>
</head>
<body>
<div id="ui">
  <button id="reseed">Reseed</button>
  <button id="save">Save</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); built = false; });

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

let seed = Math.floor(Math.random() * 99999);
let rng;

// Palette — mineral/crystal
const FILLS = [
  '#f0ead6','#ede7d1','#e8e2cc','#f2eddb','#eae4ce',
  '#e5dfc9','#ddd7c1','#d8d2bc',
];
const STROKES = ['#4a3c2a','#5a4838','#3a2e20','#6a5a44'];
const ACCENTS = [
  '#2255aa','#6fc8d0','#aa2233','#d4a020',
  '#e87820','#3a8855','#7744bb','#cc3366',
];
const BG = '#12100c';
const BG2 = '#1a1714';

// ============================================================
// CRYSTAL GEOMETRY
// We grow Voronoi-like crystal cells from seed points,
// then recursively subdivide each cell into faceted shards.
// Each shard gets concentric inner lines (growth rings)
// and occasional accent veins.
// ============================================================

class CrystalCell {
  constructor(points, depth, parentAngle) {
    this.points = points; // [{x,y}, ...]
    this.depth = depth;
    this.parentAngle = parentAngle;
    this.children = [];
    this.fillIdx = Math.floor(rng() * FILLS.length);
    this.strokeIdx = Math.floor(rng() * STROKES.length);
    this.accentIdx = Math.floor(rng() * ACCENTS.length);
    this.isAccent = rng() < 0.08;
    this.phase = rng() * Math.PI * 2;
    this.phaseVel = (rng() - 0.5) * 0.003;
    this.growthRings = Math.max(1, Math.floor((4 - depth) * (1 + rng())));
    this.veinAngle = rng() * Math.PI;
    this.hasVein = rng() < 0.15 && depth < 3;
  }

  centroid() {
    let cx = 0, cy = 0;
    for (const p of this.points) { cx += p.x; cy += p.y; }
    return { x: cx / this.points.length, y: cy / this.points.length };
  }

  area() {
    let a = 0;
    const n = this.points.length;
    for (let i = 0; i < n; i++) {
      const j = (i + 1) % n;
      a += this.points[i].x * this.points[j].y;
      a -= this.points[j].x * this.points[i].y;
    }
    return Math.abs(a) / 2;
  }
}

let cells = [];
let allCells = [];

// Generate seed points and compute Voronoi via relaxed iteration
function generateSeedPoints(n) {
  const points = [];
  // Poisson-disk-ish via rejection
  const minDist = Math.min(W, H) / (Math.sqrt(n) * 1.1);
  let attempts = 0;
  while (points.length < n && attempts < n * 50) {
    attempts++;
    const x = rng() * W;
    const y = rng() * H;
    let ok = true;
    for (const p of points) {
      if (Math.hypot(x - p.x, y - p.y) < minDist * (0.5 + rng() * 0.5)) {
        ok = false; break;
      }
    }
    if (ok) points.push({x, y});
  }
  return points;
}

// Simple Voronoi via pixel assignment is too slow.
// Instead: generate random convex polygons by angular subdivision around seeds.
function generateCrystalCells() {
  const numSeeds = 18 + Math.floor(rng() * 14);
  const seeds = generateSeedPoints(numSeeds);

  // For each seed, create a polygon by finding the perpendicular bisector intersections
  // Simpler approach: radial polygon clipped to neighbors
  for (const seed of seeds) {
    // Find distances to all other seeds
    const others = seeds.filter(s => s !== seed)
      .map(s => ({...s, d: Math.hypot(s.x - seed.x, s.y - seed.y)}))
      .sort((a, b) => a.d - b.d)
      .slice(0, 8); // nearest neighbors

    // Start with a large polygon around the seed
    let poly = [
      {x: seed.x - W*0.6, y: seed.y - H*0.6},
      {x: seed.x + W*0.6, y: seed.y - H*0.6},
      {x: seed.x + W*0.6, y: seed.y + H*0.6},
      {x: seed.x - W*0.6, y: seed.y + H*0.6},
    ];

    // Clip by each bisector
    for (const other of others) {
      const mx = (seed.x + other.x) / 2;
      const my = (seed.y + other.y) / 2;
      // Normal of bisector line points from seed toward other
      const nx = other.x - seed.x;
      const ny = other.y - seed.y;
      const len = Math.hypot(nx, ny);
      if (len < 0.001) continue;
      const nnx = nx / len, nny = ny / len;

      poly = clipPolygon(poly, mx, my, nnx, nny);
      if (poly.length < 3) break;
    }

    // Clip to canvas bounds
    poly = clipPolygon(poly, W/2, 0, 0, 1);   // top
    poly = clipPolygon(poly, W/2, H, 0, -1);   // bottom
    poly = clipPolygon(poly, 0, H/2, 1, 0);    // left
    poly = clipPolygon(poly, W, H/2, -1, 0);   // right

    if (poly.length >= 3) {
      const cell = new CrystalCell(poly, 0, rng() * Math.PI * 2);
      cells.push(cell);
      allCells.push(cell);
    }
  }
}

// Sutherland-Hodgman polygon clipping against a half-plane
// Keep the side where dot(p - point_on_line, normal) <= 0
function clipPolygon(poly, lx, ly, nx, ny) {
  if (poly.length < 3) return poly;
  const out = [];
  for (let i = 0; i < poly.length; i++) {
    const cur = poly[i];
    const nxt = poly[(i + 1) % poly.length];
    const dc = (cur.x - lx) * nx + (cur.y - ly) * ny;
    const dn = (nxt.x - lx) * nx + (nxt.y - ly) * ny;
    if (dc <= 0) out.push(cur);
    if ((dc <= 0) !== (dn <= 0)) {
      // Intersection
      const t = dc / (dc - dn);
      out.push({
        x: cur.x + t * (nxt.x - cur.x),
        y: cur.y + t * (nxt.y - cur.y),
      });
    }
  }
  return out;
}

// Subdivide a cell into smaller faceted shards
function subdivideCell(cell, maxDepth) {
  if (cell.depth >= maxDepth || cell.area() < 400) return;

  const c = cell.centroid();
  const n = cell.points.length;

  // Split into triangular/quad facets from centroid
  // Jitter the centroid for asymmetry
  const jx = c.x + (rng() - 0.5) * cell.area() * 0.0002;
  const jy = c.y + (rng() - 0.5) * cell.area() * 0.0002;

  // Occasionally do a linear split instead of radial
  if (rng() < 0.35 && n >= 4) {
    // Pick a random split: connect midpoints of two edges
    const e1 = Math.floor(rng() * n);
    let e2 = (e1 + Math.floor(n/2 + (rng()-0.5) * n * 0.3)) % n;
    if (e2 === e1) e2 = (e1 + 1) % n;

    const m1 = midpoint(cell.points[e1], cell.points[(e1+1)%n], 0.3 + rng() * 0.4);
    const m2 = midpoint(cell.points[e2], cell.points[(e2+1)%n], 0.3 + rng() * 0.4);

    // Build two polygons
    const polyA = [], polyB = [];
    let side = 0;
    for (let i = 0; i < n; i++) {
      if (side === 0) polyA.push(cell.points[i]);
      else polyB.push(cell.points[i]);
      if (i === e1) { polyA.push(m1); polyB.push(m1); side = 1; }
      if (i === e2) { polyB.push(m2); polyA.push(m2); side = 0; }
    }

    for (const poly of [polyA, polyB]) {
      if (poly.length >= 3) {
        const child = new CrystalCell(poly, cell.depth + 1, cell.parentAngle + rng() * 0.5);
        cell.children.push(child);
        allCells.push(child);
        subdivideCell(child, maxDepth);
      }
    }
  } else {
    // Radial split from jittered centroid
    for (let i = 0; i < n; i++) {
      const j = (i + 1) % n;
      const tri = [{x: jx, y: jy}, cell.points[i], cell.points[j]];
      const child = new CrystalCell(tri, cell.depth + 1, cell.parentAngle + rng() * 0.3);
      cell.children.push(child);
      allCells.push(child);
      subdivideCell(child, maxDepth);
    }
  }
}

function midpoint(a, b, t) {
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

// ============================================================
// RENDERING
// ============================================================

function drawCell(ctx, cell, time) {
  const pts = cell.points;
  if (pts.length < 3) return;

  const phase = cell.phase + time * cell.phaseVel;
  const shimmer = 0.97 + 0.03 * Math.sin(phase);

  // Only draw leaf cells (no children) for fill
  if (cell.children.length === 0) {
    // Fill
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();

    const baseColor = FILLS[cell.fillIdx];
    ctx.fillStyle = baseColor;
    ctx.globalAlpha = shimmer;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Growth rings — inset polygons
    const c = cell.centroid();
    for (let r = 1; r <= cell.growthRings; r++) {
      const t = r / (cell.growthRings + 1.5);
      const ringPts = pts.map(p => ({
        x: p.x + (c.x - p.x) * t,
        y: p.y + (c.y - p.y) * t,
      }));
      ctx.beginPath();
      ctx.moveTo(ringPts[0].x, ringPts[0].y);
      for (let i = 1; i < ringPts.length; i++) ctx.lineTo(ringPts[i].x, ringPts[i].y);
      ctx.closePath();
      ctx.strokeStyle = STROKES[cell.strokeIdx];
      ctx.lineWidth = 0.4;
      ctx.globalAlpha = 0.15 + 0.1 * Math.sin(phase + r);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Accent: colored inner fill for rare cells
    if (cell.isAccent) {
      const t = 0.6;
      const innerPts = pts.map(p => ({
        x: p.x + (c.x - p.x) * t,
        y: p.y + (c.y - p.y) * t,
      }));
      ctx.beginPath();
      ctx.moveTo(innerPts[0].x, innerPts[0].y);
      for (let i = 1; i < innerPts.length; i++) ctx.lineTo(innerPts[i].x, innerPts[i].y);
      ctx.closePath();
      ctx.fillStyle = ACCENTS[cell.accentIdx];
      ctx.globalAlpha = 0.12 + 0.06 * Math.sin(phase * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Accent dot at centroid
      ctx.beginPath();
      ctx.arc(c.x, c.y, 2 + Math.sin(phase) * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = ACCENTS[cell.accentIdx];
      ctx.globalAlpha = 0.6;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Vein — a line across the facet suggesting cleavage
    if (cell.hasVein) {
      const va = cell.veinAngle;
      const ext = Math.sqrt(cell.area()) * 0.4;
      ctx.beginPath();
      ctx.moveTo(c.x - Math.cos(va) * ext, c.y - Math.sin(va) * ext);
      ctx.lineTo(c.x + Math.cos(va) * ext, c.y + Math.sin(va) * ext);
      ctx.strokeStyle = ACCENTS[cell.accentIdx];
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.2;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Draw children
  for (const child of cell.children) {
    drawCell(ctx, child, time);
  }

  // Always draw edges (over children)
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();

  const depthAlpha = [0.9, 0.55, 0.35, 0.2, 0.12][Math.min(cell.depth, 4)];
  const depthWidth = [1.4, 0.9, 0.55, 0.35, 0.25][Math.min(cell.depth, 4)];

  ctx.strokeStyle = cell.isAccent ? ACCENTS[cell.accentIdx] : STROKES[cell.strokeIdx];
  ctx.lineWidth = depthWidth;
  ctx.globalAlpha = depthAlpha;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ============================================================
// BUILD & LOOP
// ============================================================

let built = false;

function build() {
  rng = mulberry32(seed);
  cells = [];
  allCells = [];
  generateCrystalCells();
  for (const cell of [...cells]) {
    subdivideCell(cell, 3 + Math.floor(rng() * 2));
  }
  built = true;
}

function frame(time) {
  if (!built) build();

  const t = time * 0.001;

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Subtle background grain
  ctx.globalAlpha = 0.015;
  for (let i = 0; i < 800; i++) {
    const x = ((Math.sin(i * 127.1 + t * 0.1) * 0.5 + 0.5) * W) | 0;
    const y = ((Math.sin(i * 311.7 + t * 0.07) * 0.5 + 0.5) * H) | 0;
    ctx.fillStyle = STROKES[i % STROKES.length];
    ctx.fillRect(x, y, 1, 1);
  }
  ctx.globalAlpha = 1;

  for (const cell of cells) {
    drawCell(ctx, cell, t);
  }

  // Vertex dots at intersections
  const drawnVerts = new Set();
  for (const cell of allCells) {
    if (cell.children.length > 0) continue;
    for (const p of cell.points) {
      const key = (p.x * 1000 | 0) + ',' + (p.y * 1000 | 0);
      if (drawnVerts.has(key)) continue;
      drawnVerts.add(key);
      const dotR = 1.2 + 0.3 * Math.sin(t * 2 + p.x * 0.01 + p.y * 0.01);
      ctx.beginPath();
      ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = STROKES[0];
      ctx.globalAlpha = 0.3;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  requestAnimationFrame(frame);
}

document.getElementById('reseed').addEventListener('click', () => {
  seed = Math.floor(Math.random() * 99999);
  built = false;
});

document.getElementById('save').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'crystalline.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

requestAnimationFrame(frame);
</script>
</body>
</html>
